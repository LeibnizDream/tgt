# Run worker processes as the 'nobody' user 
# user nobody;
# Number of worker processes to spawn (usually set to number of CPU cores)
worker_processes 1;

# --- Event loop configuration ---
events {
    # Max simultaneous connections per worker process
    worker_connections 1024;
    # Use efficient connection method (Linux/Unix only)
    use select;
}

# --- HTTP server configuration ---
http {
    # Load mappings from file extensions to MIME types
    include       mime.types;
    # Default MIME type if none is specified by the upstream
    default_type  application/octet-stream;

    # Hide nginx version for security
    server_tokens off;

    # Basic performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Basic rate limiting (generous for VPN environment)
    limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;

    # --- First server block: Redirect HTTP → HTTPS ---
    server {
        # Listen on IPv4 port 80 (standard HTTP)
        listen       80;
        # Listen on IPv6 port 80 as well
        listen       [::]:80;
        # Catch-all server name
        server_name  _;
        # Immediately redirect any request to the same URL under HTTPS
        return       301 https://$host$request_uri;
    }

    # --- Second server block: Serve over HTTPS ---
    server {
        # Listen on IPv4 port 443 with SSL/TLS enabled and HTTP/2 support
        listen              443 ssl;
        # Listen on IPv6 port 443 with SSL/TLS and HTTP/2
        listen              [::]:443 ssl;
        # The IP or domain this server block responds to
        server_name         172.20.49.10;

        # SSL Configuration
        ssl_certificate     C:/nginx/ssl/selfsigned.crt;
        ssl_certificate_key C:/nginx/ssl/selfsigned.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Basic security headers (VPN-appropriate)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # File to log all incoming requests
        access_log  logs/access.log;
        # File to log internal Nginx errors
        error_log   logs/error.log;

        # --- Main proxy pass for all application traffic ---
        location / {
            # Basic rate limiting (generous for VPN)
            limit_req zone=general burst=100 nodelay;

            # Forward all requests to the local Uvicorn server
            proxy_pass            http://127.0.0.1:8000;
            # Use HTTP/1.1 when speaking to the upstream
            proxy_http_version    1.1;
            # Disable buffering so that each chunk is sent immediately
            proxy_buffering       off;
            # Turn off any proxy-level caching
            proxy_cache           off;

            # Support WebSocket or SSE upgrades
            proxy_set_header      Upgrade $http_upgrade;
            proxy_set_header      Connection "upgrade";

            # Preserve headers
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;

            # Reasonable timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Buffer settings
            proxy_buffer_size     4k;
            proxy_buffers         8 4k;
        }

        # Block access to hidden files/directories
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Define a custom error page for server-side errors
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}